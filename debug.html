<!DOCTYPE html>
<html>
<head><title>Sync Debug v2</title></head>
<body style="font-family:monospace;padding:20px;background:#111;color:#eee">
<h2>🔧 Sync Debug v2</h2>
<div id="log" style="white-space:pre-wrap;line-height:1.8"></div>
<hr style="margin:20px 0;border-color:#333">
<h3>iframe 1 (GET pull):</h3>
<iframe id="if1" style="width:100%;height:150px;border:1px solid #444;background:#fff"></iframe>
<h3>iframe 2 (direct URL - no params):</h3>
<iframe id="if2" style="width:100%;height:150px;border:1px solid #444;background:#fff"></iframe>

<script>
var SYNC_URL = 'https://script.google.com/a/macros/chainalysis.com/s/AKfycbyD97uyY-tE_TTikXNp7XvPy16MnB1AZGvgA2Vk7ZCBOTy_-rNsCtgQT9xFq2MIcWEtzA/exec';

function log(msg) {
  document.getElementById('log').textContent += new Date().toLocaleTimeString() + ' | ' + msg + '\n';
}

window.addEventListener('message', function(event) {
  log('📩 MESSAGE: ' + JSON.stringify(event.data).substring(0, 300));
});

// Test 1: iframe with params
log('TEST 1: Loading iframe with pull params...');
document.getElementById('if1').src = SYNC_URL + '?action=pull&origin=' + encodeURIComponent(window.location.origin);

// Test 2: iframe with NO params (simplest possible)
log('TEST 2: Loading iframe with bare URL...');
document.getElementById('if2').src = SYNC_URL;

// Test 3: Try window.open as popup
setTimeout(function() {
  log('\nTEST 3: Opening Apps Script URL directly...');
  log('Click this link to test in a new tab:');
  var a = document.createElement('a');
  a.href = SYNC_URL + '?action=pull&origin=test';
  a.target = '_blank';
  a.textContent = '🔗 Open Apps Script URL in new tab';
  a.style.cssText = 'color:#6366f1;font-size:16px;display:block;margin:10px 0';
  document.getElementById('log').appendChild(a);
}, 1000);

// Check iframe load events
document.getElementById('if1').onload = function() { log('✅ iframe 1 loaded (onload fired)'); };
document.getElementById('if1').onerror = function() { log('❌ iframe 1 error'); };
document.getElementById('if2').onload = function() { log('✅ iframe 2 loaded (onload fired)'); };
document.getElementById('if2').onerror = function() { log('❌ iframe 2 error'); };

setTimeout(function() {
  log('\n⏰ 20s timeout reached');
  log('If iframes are still blank: Google blocks embedding Apps Script in iframes from GitHub Pages.');
  log('Solution: use a different sync approach (direct link or popup window).');
}, 20000);
</script>
</body>
</html>

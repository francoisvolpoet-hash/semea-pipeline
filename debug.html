<!DOCTYPE html>
<html>
<head><title>Sync Test v3</title></head>
<body style="font-family:monospace;padding:20px;background:#111;color:#eee">
<h2>🔧 Sync Test — Click each button</h2>
<div id="log" style="white-space:pre-wrap;line-height:2;margin:20px 0"></div>

<button onclick="testImage()" style="padding:12px 24px;font-size:16px;margin:8px;cursor:pointer">1️⃣ Test Image() GET</button>
<button onclick="testFetch()" style="padding:12px 24px;font-size:16px;margin:8px;cursor:pointer">2️⃣ Test fetch() GET</button>
<button onclick="testFetchNoCors()" style="padding:12px 24px;font-size:16px;margin:8px;cursor:pointer">3️⃣ Test fetch() no-cors</button>
<button onclick="testNewTab()" style="padding:12px 24px;font-size:16px;margin:8px;cursor:pointer">4️⃣ Open in new tab</button>
<button onclick="testScript()" style="padding:12px 24px;font-size:16px;margin:8px;cursor:pointer">5️⃣ Test script tag</button>

<script>
var URL = 'https://script.google.com/a/macros/chainalysis.com/s/AKfycbyD97uyY-tE_TTikXNp7XvPy16MnB1AZGvgA2Vk7ZCBOTy_-rNsCtgQT9xFq2MIcWEtzA/exec';
var TEST_PARAMS = '?action=push&ae_name=BrowserTest&deal_id=browser_test_1&account=BrowserTestAcct&opportunity=BrowserTestOpp&status=On%20Track&next_step=test&blocker=&revised_acv=&revised_close=&lost_reason=&timestamp=' + encodeURIComponent(new Date().toISOString()) + '&quarter=Q1-2027';

function log(msg) {
  document.getElementById('log').textContent += new Date().toLocaleTimeString() + ' | ' + msg + '\n';
}

function testImage() {
  log('🖼️ Image() GET...');
  var img = new Image();
  img.onload = function() { log('  ✅ Image onload fired'); };
  img.onerror = function() { log('  ⚠️ Image onerror fired (expected — Apps Script returns HTML not image)'); };
  img.src = URL + TEST_PARAMS + '&t=' + Date.now();
  setTimeout(function() { log('  ⏰ 5s timeout — check Google Sheet for "BrowserTest"'); }, 5000);
}

function testFetch() {
  log('📡 fetch() GET (cors)...');
  fetch(URL + TEST_PARAMS + '&t=' + Date.now())
  .then(function(r) { log('  ✅ fetch response: ' + r.status + ' ' + r.type); return r.text(); })
  .then(function(t) { log('  Body: ' + t.substring(0,100)); })
  .catch(function(e) { log('  ❌ fetch error: ' + e.message); });
}

function testFetchNoCors() {
  log('📡 fetch() GET (no-cors)...');
  fetch(URL + TEST_PARAMS + '&t=' + Date.now(), {mode:'no-cors'})
  .then(function(r) { log('  ✅ fetch response: ' + r.status + ' type=' + r.type); })
  .catch(function(e) { log('  ❌ fetch error: ' + e.message); });
}

function testNewTab() {
  log('🪟 Opening in new tab...');
  window.open(URL + TEST_PARAMS + '&t=' + Date.now(), '_blank');
  log('  Check the new tab — does it show JSON or an error?');
}

function testScript() {
  log('📜 Script tag...');
  var s = document.createElement('script');
  s.src = URL + TEST_PARAMS + '&t=' + Date.now();
  s.onload = function() { log('  ✅ Script loaded'); };
  s.onerror = function() { log('  ❌ Script error'); };
  document.body.appendChild(s);
  setTimeout(function() { log('  ⏰ 5s timeout — check Google Sheet'); }, 5000);
}
</script>
</body>
</html>
